name: CareVault Frontend CI

on:
  push:
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run test:run
        working-directory: frontend

  build:
    needs: [lint-and-type-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v3
        with:
          name: dist
          path: frontend/dist/

