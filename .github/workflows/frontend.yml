name: CareVault Frontend CI

on:
  push:
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'

permissions:
  contents: read

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - run: npm ci
        working-directory: frontend

      - run: npm run type-check
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - run: npm ci
        working-directory: frontend

      - run: npm run test:run
        working-directory: frontend

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - name: Verify build artifacts
        run: |
          test -f frontend/dist/index.html || exit 1
          test -d frontend/dist/assets || exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

