name: Soroban Contract CI

on:
  push:
    branches:
      - main
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - '.cargo/**'
  pull_request:
    branches:
      - main
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - '.cargo/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check contracts
        run: cargo check

  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: check
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build WASM contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Verify WASM artifacts exist
        run: |
          test -f target/wasm32-unknown-unknown/release/record_registry.wasm || exit 1
          test -f target/wasm32-unknown-unknown/release/access_control.wasm || exit 1
          ls -lh target/wasm32-unknown-unknown/release/*.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 5
