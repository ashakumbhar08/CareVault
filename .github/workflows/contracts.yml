name: Soroban Contract CI

on:
  push:
    paths:
      - 'contracts/**'
      - 'contracts/Cargo.toml'
      - '.cargo/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - 'contracts/Cargo.toml'
      - '.cargo/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'contracts'

      - name: Check contracts
        run: cargo check
        working-directory: contracts

  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'contracts'

      - name: Build WASM contracts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Verify WASM artifacts exist
        run: |
          test -f contracts/target/wasm32-unknown-unknown/release/record_registry.wasm || exit 1
          test -f contracts/target/wasm32-unknown-unknown/release/access_control.wasm || exit 1
          ls -lh contracts/target/wasm32-unknown-unknown/release/*.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: |
            contracts/target/wasm32-unknown-unknown/release/record_registry.wasm
            contracts/target/wasm32-unknown-unknown/release/access_control.wasm
          retention-days: 5
